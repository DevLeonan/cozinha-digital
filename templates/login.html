<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8"><title>Login - Cozinha Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-800">Acesso Lojista</h2>
            <p class="text-sm text-slate-500 mt-1">Gerencie seu cardápio</p>
        </div>

        {% if erro %}
        <div class="bg-rose-100 border border-rose-200 text-rose-600 px-4 py-3 rounded-xl text-sm font-bold text-center mb-6">
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">WhatsApp da Loja</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" name="whatsapp" required placeholder="Apenas números" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Senha de Acesso (6 dígitos)</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="password" name="senha" required placeholder="******" maxlength="6" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none tracking-widest font-mono">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-indigo-500/30">
                Entrar no Painel 👉
            </button>
        </form>
    </div>
</body>
</html>
