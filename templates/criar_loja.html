<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Dados da Loja</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Passo 1: Sua Marca</h2>
        <p class="text-gray-500 mb-6">Como é a cara do seu negócio?</p>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-5">
                <label class="block text-gray-700 font-bold mb-3">Qual o seu segmento?</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="cor_principal" value="#0f172a" class="peer sr-only" required>
                        <div class="p-3 border-2 rounded-xl text-center peer-checked:border-slate-900 peer-checked:bg-slate-50 transition">
                            <div class="w-8 h-8 rounded-full bg-slate-900 mx-auto mb-1"></div>
                            <span class="text-xs font-bold text-gray-700">Hamburgueria</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="cor_principal" value="#9333ea" class="peer sr-only">
                        <div class="p-3 border-2 rounded-xl text-center peer-checked:border-purple-600 peer-checked:bg-purple-50 transition">
                            <div class="w-8 h-8 rounded-full bg-purple-600 mx-auto mb-1"></div>
                            <span class="text-xs font-bold text-gray-700">Açaiteria</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="cor_principal" value="#f97316" class="peer sr-only">
                        <div class="p-3 border-2 rounded-xl text-center peer-checked:border-orange-500 peer-checked:bg-orange-50 transition">
                            <div class="w-8 h-8 rounded-full bg-orange-500 mx-auto mb-1"></div>
                            <span class="text-xs font-bold text-gray-700">Lanchonete/Trailer</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="cor_principal" value="#dc2626" class="peer sr-only">
                        <div class="p-3 border-2 rounded-xl text-center peer-checked:border-red-600 peer-checked:bg-red-50 transition">
                            <div class="w-8 h-8 rounded-full bg-red-600 mx-auto mb-1"></div>
                            <span class="text-xs font-bold text-gray-700">Pizzaria</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" name="nome" placeholder="Nome do Estabelecimento" required class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="mb-4">
                <input type="text" name="whatsapp" placeholder="WhatsApp (Ex: 51999999999)" required class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-gray-500 text-sm font-bold mb-2">Sua Logo</label>
                <input type="file" name="logo" accept="image/*" class="w-full p-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 px-4 rounded-xl text-lg hover:bg-slate-800">Avançar 👉</button>
        </form>
    </div>
</body>
</html>
